<!doctype html>
<html lang="de" class="sm-page-loading">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Loren-Minispiel | Tastminen</title>
  <link rel="stylesheet" href="../assets/css/style.css?v=134">
  <style>
    :root {
      --mine-ui: rgba(255, 248, 222, 0.92);
      --mine-brown: #4a2b16;
      --mine-gold: #f5b22d;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: visible;
      background: #160f13;
      touch-action: none;
      overscroll-behavior: none;
    }

    body.mine-minigame-page {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #2f2417;
    }

    .mine-game-shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, rgba(120, 82, 44, 0.45), rgba(9, 7, 8, 0.95));
    }

    #mineCanvas {
      width: 100vw;
      height: 100vh;
      display: block;
      background: #211812;
    }

    .mine-hud {
      position: fixed;
      top: calc(max(14px, env(safe-area-inset-top)) + 19px);
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 620px);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      z-index: 5;
      pointer-events: none;
    }

    .mine-hud-card {
      padding: 10px 14px;
      border: 3px solid rgba(86, 50, 20, 0.7);
      border-radius: 18px;
      background: var(--mine-ui);
      box-shadow: 0 8px 0 rgba(60, 31, 10, 0.28), 0 10px 22px rgba(0, 0, 0, 0.24);
      font-weight: 900;
    }

    #mineTimerText { display: none; }

    .mine-progress-track {
      height: 14px;
      margin-top: 0;
      border-radius: 999px;
      background: rgba(74, 43, 22, 0.22);
      overflow: hidden;
    }

    #mineProgressFill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffd15a, #ff8e22);
      transition: width 0.18s linear;
    }

    #mineHearts {
      min-width: 92px;
      text-align: center;
      color: #d92727;
      letter-spacing: 2px;
      font-size: clamp(22px, 6vw, 34px);
      line-height: 1;
    }

    .mine-controls-hint {
      display: none;
      position: fixed;
      left: 50%;
      bottom: max(12px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 4;
      width: min(90vw, 560px);
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 248, 222, 0.82);
      color: #4a2b16;
      font-weight: 800;
      font-size: clamp(13px, 3.2vw, 16px);
      text-align: center;
      box-shadow: 0 5px 14px rgba(0,0,0,0.24);
      pointer-events: none;
    }

    .mine-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(3px);
      padding: 18px;
    }

    .mine-overlay.hidden {
      display: none !important;
    }

    .mine-popup {
      position: relative;
      width: min(88vw, 480px);
      min-height: 430px;
      display: grid;
      place-items: center;
      padding: 54px 42px 58px;
      text-align: center;
      color: #432b16;
      isolation: isolate;
      animation: minePopupIn 0.35s ease both;
    }

    .mine-popup::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: url('../assets/images/ui/parchment_popup.png') center / 100% 100% no-repeat;
      filter: drop-shadow(0 18px 24px rgba(0,0,0,0.35));
    }

    .mine-popup h1,
    .mine-popup h2 {
      margin: 0 0 14px;
      font-size: clamp(30px, 7vw, 46px);
      line-height: 1.05;
    }

    .mine-popup p {
      margin: 10px auto;
      max-width: 340px;
      font-size: clamp(17px, 4vw, 22px);
      font-weight: 800;
      line-height: 1.35;
    }

    .mine-popup .small-note {
      font-size: clamp(14px, 3.4vw, 17px);
      font-weight: 750;
      opacity: 0.86;
    }

    .mine-popup-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .mine-button {
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      font: inherit;
      font-size: clamp(16px, 4vw, 21px);
      font-weight: 950;
      color: #372511;
      background: linear-gradient(#ffe47c, #f5a82b);
      box-shadow: 0 8px 0 #a65d16, 0 12px 18px rgba(0,0,0,0.22);
      cursor: pointer;
    }

    .mine-button:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #a65d16, 0 8px 12px rgba(0,0,0,0.18);
    }

    .mine-button.secondary {
      background: #eef2ff;
      box-shadow: 0 7px 0 #b7c2dd, 0 12px 18px rgba(0,0,0,0.18);
    }



    .bridge-overlay {
      position: fixed;
      inset: 0;
      z-index: 8;
      display: grid;
      place-items: center;
      padding: 14px;
      background: rgba(10, 7, 5, 0.34);
      backdrop-filter: blur(2px);
    }

    .bridge-overlay.hidden { display: none !important; }

    .bridge-panel {
      width: min(94vw, 760px);
      max-height: min(82vh, 760px);
      display: grid;
      grid-template-rows: auto auto minmax(230px, 1fr) auto;
      gap: 12px;
      padding: 16px;
      border: 4px solid rgba(89, 52, 21, 0.82);
      border-radius: 26px;
      background: rgba(255, 246, 213, 0.96);
      box-shadow: 0 16px 32px rgba(0,0,0,0.35), inset 0 0 0 3px rgba(255,255,255,0.36);
      color: #392514;
    }

    .bridge-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .bridge-header h2 { margin: 0 0 4px; font-size: clamp(24px, 6vw, 38px); line-height: 1; }
    .bridge-header p { margin: 0; font-size: clamp(14px, 3.5vw, 18px); font-weight: 850; }

    #bridgeRecipeText {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .recipe-icon {
      display: inline-grid;
      place-items: center;
      width: clamp(38px, 9vw, 54px);
      height: clamp(38px, 9vw, 54px);
      border-radius: 14px;
      background: rgba(255,255,255,.64);
      border: 2px solid rgba(88,54,25,.42);
      font-size: clamp(26px, 7vw, 38px);
      line-height: 1;
    }

    .recipe-plus {
      font-weight: 1000;
      font-size: clamp(20px, 5vw, 30px);
      color: #4a2b16;
    }

    .bridge-timer {
      min-width: 62px;
      padding: 9px 11px;
      border-radius: 18px;
      background: #362112;
      color: #ffe081;
      font-size: clamp(24px, 7vw, 40px);
      font-weight: 1000;
      text-align: center;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.24);
    }

    .bridge-slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      min-height: 82px;
    }

    .bridge-slot {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 78px;
      border: 3px dashed rgba(92, 56, 24, 0.55);
      border-radius: 20px;
      background: rgba(255,255,255,0.54);
      font-weight: 950;
      color: rgba(62, 37, 18, 0.72);
      text-align: center;
      font-size: clamp(13px, 3.2vw, 16px);
    }

    .slot-placeholder {
      font-size: clamp(30px, 8vw, 42px);
      opacity: .55;
    }

    .slot-icon {
      font-size: clamp(36px, 9vw, 52px);
      line-height: 1;
    }

    .bridge-materials {
      position: relative;
      min-height: 270px;
      border: 3px solid rgba(92, 56, 24, 0.35);
      border-radius: 22px;
      overflow: visible;
      background:
        radial-gradient(circle at 20% 20%, rgba(172, 120, 61, .16), transparent 34%),
        radial-gradient(circle at 80% 70%, rgba(98, 59, 32, .12), transparent 38%),
        rgba(247, 225, 180, 0.72);
      touch-action: none;
    }

    .material-chip {
      position: absolute;
      width: 68px;
      height: 68px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 3px solid rgba(58, 36, 18, .58);
      box-shadow: 0 7px 0 rgba(69, 42, 17, .30), 0 10px 16px rgba(0,0,0,.18);
      font-weight: 1000;
      font-size: 32px;
      color: #2f2118;
      text-align: center;
      user-select: none;
      touch-action: none;
      cursor: grab;
    }

    .chip-icon {
      display: block;
      font-size: 36px;
      line-height: 1;
      filter: drop-shadow(0 2px 1px rgba(0,0,0,.18));
    }



    .material-icon {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      overflow: hidden;
      box-sizing: border-box;
    }

    .recipe-icon, .slot-icon, .chip-icon {
      display: inline-grid;
      place-items: center;
      line-height: 1;
    }

    .recipe-icon { width: clamp(38px, 9vw, 54px); height: clamp(38px, 9vw, 54px); }
    .slot-icon { width: clamp(42px, 10vw, 58px); height: clamp(42px, 10vw, 58px); }
    .chip-icon { width: 44px; height: 44px; filter: drop-shadow(0 2px 1px rgba(0,0,0,.18)); }

    .material-icon::before, .material-icon::after { content: ""; position: absolute; box-sizing: border-box; }
    .material-icon.brick { background:#b8583c; border:3px solid #6d2b1c; }
    .material-icon.brick::before { inset:8px 3px auto; height:3px; background:#ffd1b5; box-shadow:0 10px 0 #ffd1b5, 0 20px 0 #ffd1b5; opacity:.85; }
    .material-icon.brick::after { top:3px; bottom:3px; left:50%; width:3px; background:#ffd1b5; box-shadow:-15px 10px 0 #ffd1b5, 15px 20px 0 #ffd1b5; opacity:.75; }

    .material-icon.metal { background:linear-gradient(135deg,#dce8f4,#7d8790); border:3px solid #4f5962; }
    .material-icon.metal::before { left:7px; right:7px; top:18px; height:7px; border-radius:4px; background:#34404a; }
    .material-icon.metal::after { left:17px; top:5px; width:8px; height:32px; border-radius:4px; background:#f3f7fb; box-shadow:0 0 0 2px #4f5962; }

    .material-icon.wood { background:#b87333; border:3px solid #6c3b17; }
    .material-icon.wood::before { left:5px; right:5px; top:10px; height:8px; border-radius:999px; background:#e4a45f; box-shadow:0 13px 0 #91501f; }
    .material-icon.wood::after { inset:8px; border:2px solid rgba(83,39,12,.55); border-radius:999px; transform:rotate(-18deg); }

    .material-icon.rope { background:#e0be78; border:3px solid #8c6326; }
    .material-icon.rope::before { inset:8px; border:6px solid #8c6326; border-radius:999px; }
    .material-icon.rope::after { left:8px; top:19px; width:27px; height:4px; background:#f6d78f; transform:rotate(-32deg); border-radius:999px; box-shadow:0 8px 0 #8c6326; }

    .material-icon.clay { background:#b9794c; border:3px solid #68402a; border-radius:999px 55% 70% 60%; }
    .material-icon.clay::before { left:8px; top:9px; width:25px; height:19px; background:#8f5839; border-radius:58% 42% 60% 40%; }
    .material-icon.clay::after { left:12px; top:11px; width:8px; height:5px; background:rgba(255,238,200,.45); border-radius:999px; }

    .material-icon.grass { background:#dff4c4; border:3px solid #5d8b34; }
    .material-icon.grass::before { bottom:5px; left:6px; width:7px; height:26px; background:#4d9d32; border-radius:999px 999px 0 0; transform:rotate(18deg); box-shadow:9px -3px 0 #6fbf3c, 18px 0 0 #3f842a, 27px -4px 0 #79c849; }

    .material-icon.hay { background:#ead36d; border:3px solid #9f8127; }
    .material-icon.hay::before { left:7px; right:7px; top:12px; height:5px; background:#8f741f; box-shadow:0 9px 0 #8f741f, 0 18px 0 #8f741f; transform:rotate(7deg); }
    .material-icon.hay::after { inset:7px 16px; border-left:3px solid rgba(116,86,14,.7); transform:rotate(-18deg); }

    .material-icon.moss { background:#7ca75e; border:3px solid #3d642e; border-radius:999px; }
    .material-icon.moss::before { left:4px; top:15px; width:16px; height:14px; background:#4d7e37; border-radius:999px; box-shadow:12px -7px 0 #90bd6b, 22px 2px 0 #527f3e; }

    .material-icon.paper { background:#f7f1df; border:3px solid #b8a889; }
    .material-icon.paper::before { right:0; top:0; border-style:solid; border-width:0 13px 13px 0; border-color:transparent #d7cab3 transparent transparent; }
    .material-icon.paper::after { left:8px; right:8px; top:15px; height:3px; background:#b8a889; box-shadow:0 8px 0 #b8a889; opacity:.8; }

    .material-icon.feather { background:#e9d3b5; border:3px solid #9e7652; }
    .material-icon.feather::before { left:10px; top:5px; width:24px; height:31px; background:#f7ecd8; border:3px solid #9e7652; border-radius:100% 0 100% 0; transform:rotate(22deg); }
    .material-icon.feather::after { left:20px; top:8px; width:3px; height:29px; background:#8b6545; transform:rotate(22deg); }

    .material-icon.sponge { background:#edcf55; border:3px solid #9d7e1d; }
    .material-icon.sponge::before { left:8px; top:8px; width:7px; height:7px; background:#b69423; border-radius:999px; box-shadow:15px 3px 0 #b69423, 7px 17px 0 #b69423, 22px 18px 0 #b69423; }

    .material-icon.mushroom { background:#ead6bf; border:3px solid #8e5641; }
    .material-icon.mushroom::before { left:6px; right:6px; top:7px; height:19px; background:#c94f41; border-radius:999px 999px 8px 8px; }
    .material-icon.mushroom::after { left:16px; top:20px; width:12px; height:16px; background:#f6e7cf; border:2px solid #8e5641; border-radius:4px; }

    .material-icon.leaf { background:#d7f1c8; border:3px solid #5e8a39; }
    .material-icon.leaf::before { left:8px; top:8px; width:28px; height:22px; background:#6fbf4a; border:3px solid #3d7a2b; border-radius:100% 0 100% 0; transform:rotate(-20deg); }
    .material-icon.leaf::after { left:20px; top:12px; width:3px; height:22px; background:#3d7a2b; transform:rotate(38deg); }

    .material-icon.wool { background:#f0e8d8; border:3px solid #aaa08e; border-radius:999px; }
    .material-icon.wool::before { left:5px; top:13px; width:14px; height:14px; background:#fffaf0; border-radius:999px; box-shadow:10px -7px 0 #fffaf0, 20px 0 0 #fffaf0, 10px 8px 0 #e4dac7; }



    .emoji-material {
      background: rgba(255,255,255,.68) !important;
      border: 2px solid rgba(88,54,25,.36) !important;
      border-radius: 14px !important;
      overflow: visible !important;
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", system-ui, sans-serif;
      font-size: 32px;
      line-height: 1;
    }

    .emoji-material::before,
    .emoji-material::after {
      display: none !important;
      content: none !important;
    }

    .recipe-icon.emoji-material { font-size: clamp(28px, 7vw, 40px); }
    .slot-icon.emoji-material { font-size: clamp(34px, 8vw, 48px); }
    .chip-icon.emoji-material { font-size: 36px; }


    .mini-guide-emoji-row {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      max-width: none;
      flex-wrap: nowrap;
      white-space: nowrap;
    }

    .mini-guide-emoji {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-size: .78em;
      flex: 0 0 auto;
    }


    .material-chip.dragging {
      z-index: 30;
      cursor: grabbing;
      transform: scale(1.07);
      box-shadow: 0 12px 22px rgba(0,0,0,.28);
    }

    .bridge-build-button {
      justify-self: center;
      min-width: min(76vw, 280px);
    }

    .bridge-build-button:disabled {
      opacity: .48;
      filter: grayscale(.35);
      cursor: not-allowed;
    }

    @keyframes minePopupIn {
      from { opacity: 0; transform: translateY(28px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body class="mine-minigame-page">
  <div id="globalPageLoader" class="global-page-loader" role="status" aria-live="polite" aria-label="Spiel wird geladen">
    <div class="global-page-loader-card">
      <div class="global-page-loader-icon" aria-hidden="true">✨</div>
      <div class="global-page-loader-title">Spiel wird vorbereitet …</div>
      <div class="global-page-loader-track"><div id="globalPageLoaderFill" class="global-page-loader-fill"></div></div>
      <div class="global-page-loader-meta">
        <span id="globalPageLoaderNote" class="global-page-loader-note">Benötigte Dateien werden geladen.</span>
        <span id="globalPageLoaderPercent" class="global-page-loader-percent">0 %</span>
      </div>
    </div>
  </div>
  <script src="../assets/js/page-loader.js?v=127"></script>

  <audio id="mineMusic" src="../assets/audio/tastminen_minispiel_new.mp3" preload="metadata"></audio>

  <main class="mine-game-shell" aria-label="Loren-Minispiel in den Tastminen">
    <canvas id="mineCanvas" aria-label="Minenlore weicht Schienenlücken aus und baut Brücken"></canvas>
  </main>

  <div class="mine-hud" aria-live="polite">
    <div class="mine-hud-card">
      <div id="mineTimerText"></div>
      <div class="mine-progress-track" aria-hidden="true"><div id="mineProgressFill"></div></div>
    </div>
    <div id="mineHearts" class="mine-hud-card" aria-label="Lebenspunkte">♥♥♥</div>
  </div>

  <div class="mine-controls-hint">Race: Mit Pfeiltasten, A/D oder Wischen die Spur wechseln. Bauphase: Materialien in den Baukasten ziehen.</div>



  <div id="bridgeOverlay" class="bridge-overlay hidden" aria-live="polite">
    <section class="bridge-panel">
      <div class="bridge-header">
        <div>
          <h2>Brücke bauen</h2>
          <p id="bridgeRecipeText">Bauplan wird vorbereitet …</p>
        </div>
        <div id="bridgeTimer" class="bridge-timer">20</div>
      </div>
      <div id="bridgeSlots" class="bridge-slots" aria-label="Baukasten"></div>
      <div id="bridgeMaterials" class="bridge-materials" aria-label="Materialien"></div>
      <button id="bridgeBuildButton" class="mine-button bridge-build-button" type="button" disabled>Brücke bauen</button>
    </section>
  </div>

  <div id="mineOverlay" class="mine-overlay" role="dialog" aria-modal="true">
    <section id="minePopup" class="mine-popup"></section>
  </div>
<script src="../assets/js/audio-crossfade.js"></script>
  <script src="../assets/js/tastminen-lore.js?v=127"></script>
  <script src="../assets/js/cloud-save.js?v=127"></script>
  <script src="../assets/js/score-system.js?v=127"></script>
<script>window.SinnesGameOver={play(){try{const a=new Audio((location.pathname.includes('/levels/')?'../':'')+'assets/audio/gameover.mp3');a.volume=Number(localStorage.getItem('masterVolume')||localStorage.getItem('sinnesmagie-volume')||0.5);a.play().catch(()=>{});}catch{}}};</script>
</body>
</html>
