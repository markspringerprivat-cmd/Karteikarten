<!doctype html>
<html lang="de" class="sm-page-loading">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Duftgarten-Minispiel | Blütensprung</title>
  <link rel="stylesheet" href="../assets/css/style.css?v=134">
  <style>
    html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#142b19; touch-action:none; overscroll-behavior:none; }
    body.duft-hop-page { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:#2a1a10; }
    .duft-hop-shell { position:fixed; inset:0; background:#142b19; }
    #duftHopCanvas { width:100vw; height:100vh; display:block; background:#224f2c; }
    .duft-hop-hud {
      position:fixed; top:max(12px, env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
      z-index:4; width:min(92vw, 720px); display:grid; grid-template-columns:minmax(0,1fr) auto; gap:10px; pointer-events:none;
    }
    .duft-card {
      border:3px solid rgba(77, 43, 20, .58); border-radius:20px; background:rgba(255,248,222,.92);
      box-shadow:0 8px 0 rgba(50,28,12,.22), 0 12px 22px rgba(0,0,0,.22); padding:10px 14px; font-weight:950;
    }
    .duft-progress { margin-top:7px; height:13px; border-radius:999px; background:rgba(68,36,18,.22); overflow:hidden; }
    #duftProgressFill { width:0%; height:100%; background:linear-gradient(90deg,#77e06d,#f5d45a); border-radius:inherit; transition:width .18s linear; }
    #duftInfoBox {
      min-width:132px; text-align:center; display:flex; flex-direction:column; justify-content:center; gap:4px;
      font-size:clamp(16px, 3.6vw, 22px); line-height:1.08;
    }
    #duftInfoLabel { font-size:clamp(12px, 2.8vw, 14px); text-transform:uppercase; letter-spacing:.6px; opacity:.78; }
    .duft-buttons {
      position:fixed; z-index:5; left:50%; bottom:max(16px, env(safe-area-inset-bottom)); transform:translateX(-50%);
      width:min(94vw, 640px); display:grid; grid-template-columns:1fr 1fr; gap:14px;
    }
    .duft-jump-button {
      border:0; border-radius:24px; padding:18px 10px; min-height:72px; font:inherit; font-size:clamp(22px, 6vw, 34px);
      font-weight:1000; color:#2b1b0b; background:linear-gradient(#fff59f,#ffc24e);
      box-shadow:0 9px 0 #a45e16, 0 14px 24px rgba(0,0,0,.24); touch-action:manipulation; user-select:none; -webkit-user-select:none;
    }
    .duft-jump-button:active, .duft-jump-button.pressed { transform:translateY(5px); box-shadow:0 4px 0 #a45e16, 0 9px 18px rgba(0,0,0,.2); }
    .duft-jump-button:disabled { opacity:.55; filter:grayscale(.25); }
    .duft-overlay { position:fixed; inset:0; z-index:10; display:grid; place-items:center; background:rgba(0,0,0,.42); backdrop-filter:blur(3px); padding:18px; }
    .duft-overlay.hidden { display:none !important; }
    .duft-popup { position:relative; width:min(90vw,520px); min-height:430px; display:grid; place-items:center; padding:54px 42px 58px; text-align:center; color:#432b16; isolation:isolate; animation:duftPopupIn .32s ease both; }
    .duft-popup::before { content:""; position:absolute; inset:0; z-index:-1; background:url('../assets/images/ui/parchment_popup.png') center / 100% 100% no-repeat; filter:drop-shadow(0 18px 24px rgba(0,0,0,.34)); }
    .duft-popup h1, .duft-popup h2 { margin:0 0 14px; font-size:clamp(30px,7vw,46px); line-height:1.05; }
    .duft-popup p { margin:9px auto; max-width:390px; font-size:clamp(16px,3.9vw,21px); font-weight:800; line-height:1.32; }
    .duft-popup ul { text-align:left; max-width:390px; margin:12px auto; font-weight:800; font-size:clamp(14px,3.4vw,17px); }
    .duft-popup-actions { display:flex; justify-content:center; flex-wrap:wrap; gap:12px; margin-top:18px; }
    .duft-button { border:0; border-radius:999px; padding:14px 24px; font:inherit; font-size:clamp(16px,4vw,21px); font-weight:950; color:#372511; background:linear-gradient(#ffe47c,#f5a82b); box-shadow:0 8px 0 #a65d16, 0 12px 18px rgba(0,0,0,.22); cursor:pointer; }
    .duft-button.secondary { background:#eef2ff; box-shadow:0 7px 0 #b7c2dd, 0 12px 18px rgba(0,0,0,.18); }
    @keyframes duftPopupIn { from{ opacity:0; transform:translateY(28px) scale(.96); } to{ opacity:1; transform:translateY(0) scale(1); } }
  </style>
</head>
<body class="duft-hop-page">
  <div id="globalPageLoader" class="global-page-loader" role="status" aria-live="polite" aria-label="Spiel wird geladen">
    <div class="global-page-loader-card">
      <div class="global-page-loader-icon" aria-hidden="true">✨</div>
      <div class="global-page-loader-title">Spiel wird vorbereitet …</div>
      <div class="global-page-loader-track"><div id="globalPageLoaderFill" class="global-page-loader-fill"></div></div>
      <div class="global-page-loader-meta">
        <span id="globalPageLoaderNote" class="global-page-loader-note">Benötigte Dateien werden geladen.</span>
        <span id="globalPageLoaderPercent" class="global-page-loader-percent">0 %</span>
      </div>
    </div>
  </div>
  <script src="../assets/js/page-loader.js?v=127"></script>

  <audio id="duftMusic" src="../assets/audio/duftgarten_new.mp3" preload="metadata"></audio>
  <main class="duft-hop-shell" aria-label="Blütensprung im Duftgarten">
    <canvas id="duftHopCanvas" aria-label="Ritter springt von Blume zu Blume"></canvas>
  </main>
  <div class="duft-buttons" aria-label="Sprungauswahl">
    <button id="jumpOne" class="duft-jump-button" type="button">1 Feld</button>
    <button id="jumpTwo" class="duft-jump-button" type="button">2 Felder</button>
  </div>
  <div id="duftOverlay" class="duft-overlay" role="dialog" aria-modal="true">
    <section id="duftPopup" class="duft-popup"></section>
  </div>
<script src="../assets/js/audio-crossfade.js"></script>
  <script src="../assets/js/duftgarten-sprung.js?v=127"></script>
  <script src="../assets/js/cloud-save.js?v=127"></script>
  <script src="../assets/js/score-system.js?v=127"></script>
<script>window.SinnesGameOver={play(){try{const a=new Audio((location.pathname.includes('/levels/')?'../':'')+'assets/audio/gameover.mp3');a.volume=Number(localStorage.getItem('masterVolume')||localStorage.getItem('sinnesmagie-volume')||0.5);a.play().catch(()=>{});}catch{}}};</script>
</body>
</html>
