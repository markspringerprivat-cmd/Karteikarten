<!doctype html>
<html lang="de" class="sm-page-loading">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Farben-Memory | Farbenreich</title>
  <link rel="stylesheet" href="../assets/css/style.css?v=134">
  <style>
    :root {
      --paint-ui: rgba(255, 250, 232, 0.94);
      --paint-brown: #4a2b16;
      --paint-blue: #2388ff;
      --paint-red: #ff3d45;
      --paint-yellow: #ffd63b;
      --paint-green: #31c95b;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      background: #192f5e;
    }

    body.color-minigame-page {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #2f2417;
    }

    .paint-shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.28)), url('../assets/images/level-backgrounds/farbenreich.webp') center / cover no-repeat;
    }

    .paint-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(14, 28, 60, 0.22);
      pointer-events: none;
    }

    .paint-game {
      position: relative;
      z-index: 1;
      width: min(96vw, 1120px);
      height: min(92vh, 720px);
      display: grid;
      grid-template-columns: 1fr clamp(82px, 13vw, 122px);
      gap: clamp(10px, 2vw, 18px);
      align-items: stretch;
      padding: clamp(8px, 1.5vw, 14px);
      box-sizing: border-box;
    }

    .paint-board-wrap {
      position: relative;
      min-width: 0;
      border: 4px solid rgba(80, 47, 19, 0.72);
      border-radius: 24px;
      overflow: hidden;
      background: rgba(255, 250, 232, 0.88);
      box-shadow: 0 14px 26px rgba(0,0,0,0.28);
    }

    #paintCanvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
      background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,246,218,0.86));
    }

    .paint-hud {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    .paint-pill {
      padding: 9px 13px;
      border: 3px solid rgba(75, 43, 16, 0.55);
      border-radius: 999px;
      background: var(--paint-ui);
      box-shadow: 0 5px 0 rgba(74,43,22,0.22);
      font-weight: 950;
      font-size: clamp(13px, 2.5vw, 18px);
      white-space: nowrap;
    }

    .paint-status {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 3;
      width: min(92%, 620px);
      padding: 10px 14px;
      border-radius: 18px;
      background: var(--paint-ui);
      border: 3px solid rgba(75, 43, 16, 0.45);
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
      font-weight: 900;
      text-align: center;
      pointer-events: none;
    }

    .paint-palette {
      display: grid;
      grid-template-rows: repeat(4, 1fr) auto auto;
      gap: 10px;
      min-width: 0;
    }

    .paint-color {
      border: 4px solid rgba(255,255,255,0.88);
      border-radius: 24px;
      box-shadow: 0 8px 0 rgba(48, 27, 12, 0.28), 0 10px 20px rgba(0,0,0,0.18);
      cursor: pointer;
      touch-action: manipulation;
      min-height: 64px;
      transform: translateZ(0);
    }

    .paint-color.active {
      outline: 5px solid #fff9b6;
      transform: translateY(4px) scale(0.98);
      box-shadow: 0 4px 0 rgba(48, 27, 12, 0.32), 0 7px 16px rgba(0,0,0,0.2);
    }

    .paint-color[data-color="blue"] { background: var(--paint-blue); }
    .paint-color[data-color="red"] { background: var(--paint-red); }
    .paint-color[data-color="yellow"] { background: var(--paint-yellow); }
    .paint-color[data-color="green"] { background: var(--paint-green); }

    .paint-tool-button {
      border: 0;
      border-radius: 18px;
      background: var(--paint-ui);
      color: #3b2612;
      font-weight: 950;
      font-size: clamp(14px, 2vw, 18px);
      box-shadow: 0 7px 0 rgba(77, 43, 17, 0.28);
      cursor: pointer;
      touch-action: manipulation;
      min-height: 54px;
    }


    .paint-tool-button.finish {
      background: linear-gradient(#fff1a6, #f6a937);
    }

    .paint-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.48);
      backdrop-filter: blur(3px);
    }

    .paint-overlay.hidden { display: none !important; }

    .paint-popup {
      position: relative;
      width: min(90vw, 520px);
      min-height: 430px;
      display: grid;
      place-items: center;
      padding: 54px 42px 58px;
      box-sizing: border-box;
      text-align: center;
      color: #432b16;
      isolation: isolate;
    }

    .paint-popup::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: url('../assets/images/ui/parchment_popup.png') center / 100% 100% no-repeat;
      filter: drop-shadow(0 18px 24px rgba(0,0,0,0.35));
    }

    .paint-popup h1,
    .paint-popup h2 {
      margin: 0 0 12px;
      font-size: clamp(30px, 7vw, 46px);
      line-height: 1.05;
    }

    .paint-popup p {
      margin: 10px auto;
      max-width: 370px;
      font-size: clamp(16px, 3.8vw, 21px);
      font-weight: 800;
      line-height: 1.34;
    }

    .paint-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
    }

    .paint-button {
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      font: inherit;
      font-size: clamp(16px, 4vw, 21px);
      font-weight: 950;
      color: #372511;
      background: linear-gradient(#ffe47c, #f5a82b);
      box-shadow: 0 8px 0 #a65d16, 0 12px 18px rgba(0,0,0,0.22);
      cursor: pointer;
    }

    .paint-button.secondary {
      background: #eef2ff;
      box-shadow: 0 7px 0 #b7c2dd, 0 12px 18px rgba(0,0,0,0.18);
    }

    @media (max-width: 760px) {
      .paint-game {
        width: 100vw;
        height: 100dvh;
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 82px;
        gap: 8px;
        padding: 8px;
      }

      .paint-palette {
        grid-template-rows: 1fr;
        grid-template-columns: repeat(4, 1fr) 0.9fr 0.75fr;
      }

      .paint-color {
        min-height: 68px;
        border-radius: 18px;
      }

      .paint-tool-button {
        min-height: 68px;
      }

      .paint-hud {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body class="color-minigame-page">
  <div id="globalPageLoader" class="global-page-loader" role="status" aria-live="polite" aria-label="Spiel wird geladen">
    <div class="global-page-loader-card">
      <div class="global-page-loader-icon" aria-hidden="true">✨</div>
      <div class="global-page-loader-title">Spiel wird vorbereitet …</div>
      <div class="global-page-loader-track"><div id="globalPageLoaderFill" class="global-page-loader-fill"></div></div>
      <div class="global-page-loader-meta">
        <span id="globalPageLoaderNote" class="global-page-loader-note">Benötigte Dateien werden geladen.</span>
        <span id="globalPageLoaderPercent" class="global-page-loader-percent">0 %</span>
      </div>
    </div>
  </div>
  <script src="../assets/js/page-loader.js?v=127"></script>

  <audio id="paintMusic" loop src="../assets/audio/farbenreich_new.mp3" preload="metadata"></audio>

  <main class="paint-shell" aria-label="Farbenreich Minispiel">
    <section class="paint-game">
      <div class="paint-board-wrap">
        <canvas id="paintCanvas" aria-label="Muster nachzeichnen"></canvas>
        <div class="paint-hud">
          <div id="paintRound" class="paint-pill">Runde 1 / 4</div>
          <div id="paintTimer" class="paint-pill">Merken: 5 s</div>
          
          
        </div>
        <div id="paintStatus" class="paint-status">Merke dir das Farbmuster.</div>
      </div>

      <aside class="paint-palette" aria-label="Farbpalette">
        <button class="paint-color active" type="button" data-color="blue" aria-label="Blau"></button>
        <button class="paint-color" type="button" data-color="red" aria-label="Rot"></button>
        <button class="paint-color" type="button" data-color="yellow" aria-label="Gelb"></button>
        <button class="paint-color" type="button" data-color="green" aria-label="Grün"></button>
        <button id="paintFinish" class="paint-tool-button finish" type="button">Runde abschließen</button>
        <button id="paintClear" class="paint-tool-button" type="button">Zurück</button>
      </aside>
    </section>
  </main>

  <div id="paintOverlay" class="paint-overlay" role="dialog" aria-modal="true">
    <section id="paintPopup" class="paint-popup"></section>
  </div>
<script src="../assets/js/audio-crossfade.js"></script>
  <script src="../assets/js/farbenreich-malen.js?v=127"></script>
  <script src="../assets/js/cloud-save.js?v=127"></script>
  <script src="../assets/js/score-system.js?v=127"></script>
<script>window.SinnesGameOver={play(){try{const a=new Audio((location.pathname.includes('/levels/')?'../':'')+'assets/audio/gameover.mp3');a.volume=Number(localStorage.getItem('masterVolume')||localStorage.getItem('sinnesmagie-volume')||0.5);a.play().catch(()=>{});}catch{}}};</script>
</body>
</html>
