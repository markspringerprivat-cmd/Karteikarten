<!doctype html>
<html lang="de" class="sm-page-loading">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Zauberschloss-Pong | Die verlorene Sinnesmagie</title>
  <link rel="stylesheet" href="../assets/css/style.css?v=134">
  <style>
    html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#07051b; touch-action:none; overscroll-behavior:none; }
    body.pong-page { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:#fff6d6; }
    .pong-shell { position:fixed; inset:0; display:grid; place-items:center; background:#050418; }
    .pong-stage { position:relative; height:100vh; width:min(100vw, calc(100vh * 941 / 1672)); max-width:100vw; overflow:hidden; background:#08051f; box-shadow:0 0 42px rgba(0,0,0,.7); touch-action:none; user-select:none; }
    .pong-bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; pointer-events:none; }
    .pong-wall { position:absolute; z-index:3; left:6%; top:6.2%; width:88%; height:13.5%; object-fit:fill; filter: drop-shadow(0 0 18px rgba(179,67,255,.95)); pointer-events:none; }
    .pong-wall.hit { animation: wallHit .42s ease both; }
    @keyframes wallHit { 0%,100%{filter:drop-shadow(0 0 18px rgba(179,67,255,.95));opacity:1;transform:scale(1)} 35%{filter:drop-shadow(0 0 42px rgba(255,255,255,1)) brightness(1.9);opacity:.72;transform:scale(1.025)} 60%{filter:drop-shadow(0 0 28px rgba(255,93,240,1)) brightness(1.25);opacity:1;transform:scale(.995)} }
    .pong-mage { position:absolute; z-index:5; top:15.2%; left:50%; width:20%; transform:translate(-50%,0); filter:drop-shadow(0 12px 12px rgba(0,0,0,.45)); pointer-events:none; }
    .pong-knight { position:absolute; z-index:6; bottom:1.6%; left:50%; width:20%; transform:translateX(-50%); filter:drop-shadow(0 12px 14px rgba(0,0,0,.5)); touch-action:none; cursor:grab; }
    .pong-knight.dragging { cursor:grabbing; filter:drop-shadow(0 0 18px rgba(105,194,255,.85)) drop-shadow(0 12px 14px rgba(0,0,0,.5)); }
    .pong-knight.stunned { filter: grayscale(.35) drop-shadow(0 0 18px rgba(255,50,50,.95)) drop-shadow(0 12px 14px rgba(0,0,0,.5)); opacity:.74; }
    .pong-ball { position:absolute; z-index:7; width:clamp(18px, 5.5vw, 35px); aspect-ratio:1; border-radius:50%; background:radial-gradient(circle at 32% 28%, #e5ffe6 0 10%, #7dff7c 20%, #19cc3a 50%, #078a21 78%); box-shadow:0 0 16px #4cff67, 0 0 34px rgba(57,255,89,.9); transform:translate(-50%,-50%); pointer-events:none; }
    .pong-ball.hidden { display:none; }
    .pong-red-ball { position:absolute; z-index:7; width:clamp(16px, 4.8vw, 30px); aspect-ratio:1; border-radius:50%; background:radial-gradient(circle at 32% 28%, #fff0e8 0 10%, #ff6a4d 24%, #df1717 58%, #790606 82%); box-shadow:0 0 16px #ff3f34, 0 0 30px rgba(255,43,43,.85); transform:translate(-50%,-50%); pointer-events:none; }
    .pong-obstacle { position:absolute; z-index:4; width:11.5%; aspect-ratio:1; border-radius:50%; background:radial-gradient(circle at 36% 30%, rgba(255,242,255,.9) 0 7%, rgba(181,75,255,.78) 22%, rgba(87,19,154,.55) 62%, rgba(29,4,67,.22) 82%); border:3px solid rgba(237,169,255,.85); box-shadow:0 0 22px rgba(184,70,255,.9), inset 0 0 22px rgba(255,233,255,.45); transform:translate(-50%,-50%); pointer-events:none; animation: obstaclePulse 1.8s ease-in-out infinite; }
    .pong-obstacle.hidden { display:none; }
    .pong-obstacle.left { left:34%; top:49%; }
    .pong-obstacle.right { left:66%; top:49%; }
    @keyframes obstaclePulse { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.9} 50%{transform:translate(-50%,-50%) scale(1.055);opacity:1} }
    .pong-hud { position:absolute; z-index:10; left:50%; top:max(8px, env(safe-area-inset-top)); transform:translateX(-50%); width:88%; display:flex; justify-content:space-between; align-items:center; gap:10px; pointer-events:none; }
    .pong-pill { border:2px solid rgba(255,224,120,.65); border-radius:999px; background:rgba(20,10,44,.72); box-shadow:0 8px 18px rgba(0,0,0,.28); padding:8px 12px; font-weight:950; font-size:clamp(13px, 3.4vw, 18px); text-shadow:0 2px 2px rgba(0,0,0,.45); }
    .pong-overlay { position:fixed; inset:0; z-index:30; display:grid; place-items:center; padding:18px; background:rgba(0,0,0,.56); backdrop-filter:blur(3px); }
    .pong-overlay.hidden { display:none!important; }
    .pong-card { position:relative; width:min(90vw, 520px); min-height:360px; padding:56px 44px 58px; display:grid; place-items:center; text-align:center; color:#432b16; isolation:isolate; }
    .pong-card::before { content:""; position:absolute; inset:0; z-index:-1; background:url('../assets/images/ui/parchment_popup.png') center/100% 100% no-repeat; filter:drop-shadow(0 18px 24px rgba(0,0,0,.4)); }
    .pong-card h1, .pong-card h2 { margin:0 0 12px; font-size:clamp(30px, 7vw, 44px); line-height:1.05; }
    .pong-card p { margin:8px auto; max-width:370px; font-size:clamp(15px, 4vw, 20px); font-weight:820; line-height:1.35; }
    .pong-actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:18px; }
    .pong-button { border:0; border-radius:999px; padding:14px 22px; font:inherit; font-weight:950; font-size:clamp(16px, 4vw, 20px); color:#342611; background:linear-gradient(#ffe47c,#f5a82b); box-shadow:0 8px 0 #a65d16, 0 12px 18px rgba(0,0,0,.22); cursor:pointer; }
    .pong-button.secondary { background:#eef2ff; box-shadow:0 7px 0 #b7c2dd, 0 12px 18px rgba(0,0,0,.18); }
    .pong-button:active { transform:translateY(5px); box-shadow:0 3px 0 #a65d16; }
    .pong-loader { position:fixed; inset:0; z-index:40; display:grid; place-items:center; background:radial-gradient(circle at center, rgba(64,20,112,.9), rgba(4,2,15,.98)); color:#fff8d6; }
    .pong-loader.hidden { display:none!important; }
    .pong-loader-card { width:min(80vw,460px); text-align:center; font-weight:950; font-size:clamp(18px, 5vw, 25px); }
    .pong-loader-bar { height:18px; margin-top:14px; border-radius:999px; background:rgba(255,255,255,.18); overflow:hidden; border:2px solid rgba(255,255,255,.35); }
    .pong-loader-bar span { display:block; height:100%; width:0%; border-radius:inherit; background:linear-gradient(90deg,#8d43ff,#f3b4ff,#fff8c7); transition:width .12s linear; }
    .pong-restart { position:absolute; right:14px; bottom:max(18px, calc(env(safe-area-inset-bottom) + 12px)); z-index:24; width:56px; height:56px; border-radius:50%; border:3px solid rgba(255,255,255,.95); background:#fff; color:#4a2c16; font-size:2rem; font-weight:950; display:grid; place-items:center; box-shadow:0 10px 22px rgba(0,0,0,.35); cursor:pointer; touch-action:manipulation; }
    .pong-restart.hidden { display:none!important; }
    .pong-restart:active { transform:scale(.94); }
    @media (orientation: landscape) { .pong-stage { width:min(64vw, calc(100vh * 941 / 1672)); } .pong-knight{width:17%;} .pong-mage{width:21%;} }
  </style>
</head>
<body class="pong-page">
  <audio id="pongMusic" src="../assets/audio/zauberschloss_new.mp3" preload="metadata" loop></audio>
  <div id="globalPageLoader" class="global-page-loader" role="status" aria-live="polite" aria-label="Spiel wird geladen">
    <div class="global-page-loader-card">
      <div class="global-page-loader-icon" aria-hidden="true">✨</div>
      <div class="global-page-loader-title">Spiel wird vorbereitet …</div>
      <div class="global-page-loader-track"><div id="globalPageLoaderFill" class="global-page-loader-fill"></div></div>
      <div class="global-page-loader-meta">
        <span id="globalPageLoaderNote" class="global-page-loader-note">Benötigte Dateien werden geladen.</span>
        <span id="globalPageLoaderPercent" class="global-page-loader-percent">0 %</span>
      </div>
    </div>
  </div>
  <script src="../assets/js/page-loader.js?v=127"></script>

  <div id="pongLoader" class="pong-loader hidden"><div class="pong-loader-card">Schlossmagie wird geladen …<div class="pong-loader-bar"><span id="pongLoaderBar"></span></div></div></div>
  <main class="pong-shell" aria-label="Zauberschloss Pong">
    <section id="pongStage" class="pong-stage">
      <img class="pong-bg" src="../assets/images/minigame/zauberschloss-pong/background.jpg" alt="Zauberschloss Spielfeld" draggable="false">
      <img id="pongWall" class="pong-wall" src="../assets/images/minigame/zauberschloss-pong/wall1.png" alt="Magische Barriere" draggable="false">
      <div id="obstacleLeft" class="pong-obstacle left hidden" aria-hidden="true"></div>
      <div id="obstacleRight" class="pong-obstacle right hidden" aria-hidden="true"></div>
      <img id="pongMage" class="pong-mage" src="../assets/images/minigame/zauberschloss-pong/magier_paddle.png" alt="Magier" draggable="false">
      <img id="pongKnight" class="pong-knight" src="../assets/images/minigame/zauberschloss-pong/ritter_paddle.png" alt="Ritter" draggable="false">
      <div id="pongBall" class="pong-ball" aria-hidden="true"></div>
      <div id="redBallLayer" aria-hidden="true"></div>
      <button id="pongRestart" class="pong-restart hidden" type="button" aria-label="Level neu starten">↻</button>
      <div class="pong-hud"><div id="pongWallText" class="pong-pill">Barriere: 0/3</div><div id="pongSpeedText" class="pong-pill">Tempo: 100%</div></div>
    </section>
  </main>
  <div id="pongOverlay" class="pong-overlay hidden" role="dialog" aria-modal="true">
    <div id="pongOverlayCard" class="pong-card"></div>
  </div>
  <script src="../assets/js/zauberschloss-pong.js?v=132"></script>
  <script src="../assets/js/cloud-save.js?v=127"></script>
  <script src="../assets/js/score-system.js?v=127"></script>
<script>window.SinnesGameOver={play(){try{const a=new Audio((location.pathname.includes('/levels/')?'../':'')+'assets/audio/gameover.mp3');a.volume=Number(localStorage.getItem('masterVolume')||localStorage.getItem('sinnesmagie-volume')||0.5);a.play().catch(()=>{});}catch{}}};</script>
</body>
</html>
