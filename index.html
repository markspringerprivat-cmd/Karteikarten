<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KartenWerk">
  <meta name="description" content="Lokale Karteikarten aus ChatGPT-Ausgaben erstellen, ordnen und lernen.">
  <title>KartenWerk – lokale Karteikarten</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="brand" id="homeButton" type="button" aria-label="Zur Startseite">
        <span class="brand-mark" aria-hidden="true">KW</span>
        <span>
          <strong>KartenWerk</strong>
          <small>Lokal. Übersichtlich. Ohne Konto.</small>
        </span>
      </button>
      <div class="topbar-actions">
        <span class="storage-badge" title="Alle Daten bleiben in diesem Browser">
          <span aria-hidden="true">●</span> lokal gespeichert
        </span>
        <button class="icon-button" id="themeToggle" type="button" aria-label="Farbschema wechseln" title="Farbschema wechseln">◐</button>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>
  </div>

  <div class="toast-region" id="toastRegion" aria-live="polite" aria-atomic="true"></div>

  <dialog id="appDialog" class="app-dialog" aria-labelledby="appDialogTitle"></dialog>

  <dialog id="confirmDialog" class="dialog">
    <form method="dialog" class="dialog-card">
      <h2 id="confirmTitle">Bestätigen</h2>
      <p id="confirmMessage"></p>
      <div class="dialog-actions">
        <button class="button ghost" value="cancel">Abbrechen</button>
        <button class="button danger" value="confirm">Löschen</button>
      </div>
    </form>
  </dialog>

  <noscript>
    <div class="noscript">Diese Anwendung benötigt JavaScript.</div>
  </noscript>
  <script src="app.js" defer></script>
</body>
</html>
